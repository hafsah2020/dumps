name: Sync Labels

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/labels.json"
      - ".github/workflows/sync-labels.yml"

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync labels
        uses: EndBug/label-sync@v2.3.3
        with:
          config-file: .github/labels.json
          delete-other-labels: false
