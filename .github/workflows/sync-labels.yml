name: Sync Labels

on:
  push:
    paths:
      - ".github/labels.json"
  workflow_dispatch:

jobs:
  labels:
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.json
          delete-other-labels: false
